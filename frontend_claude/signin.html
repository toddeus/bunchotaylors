<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In &mdash; Bunch-o-Taylors</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:   #5e72e4;
      --accent-dk:#4a5cd0;
      --bg:       #f4f6fd;
      --card-bg:  #ffffff;
      --text:     #2d3748;
      --muted:    #718096;
      --border:   #e2e8f0;
      --danger:   #e53e3e;
      --radius:   14px;
      --shadow:   0 8px 32px rgba(94,114,228,.15);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .signin-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 400px;
    }

    .brand {
      text-align: center;
      margin-bottom: 36px;
    }

    .brand img {
      display: block;
      width: 100%;
      height: auto;
      margin: 0 auto 12px;
    }

    .brand p {
      font-size: .875rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: .8125rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
      letter-spacing: .02em;
      text-transform: uppercase;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 1rem;
      color: var(--text);
      background: #fff;
      transition: border-color .15s, box-shadow .15s;
      outline: none;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(94,114,228,.15);
    }

    .btn-signin {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .1s;
      margin-top: 8px;
    }

    .btn-signin:hover { background: var(--accent-dk); }
    .btn-signin:active { transform: scale(.98); }

    .btn-signin:disabled {
      opacity: .65;
      cursor: not-allowed;
    }

    .error-msg {
      background: #fff5f5;
      border: 1px solid #fed7d7;
      color: var(--danger);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: .875rem;
      margin-top: 16px;
      display: none;
    }

    .error-msg.visible { display: block; }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="signin-card">
    <div class="brand">
      <img src="banner.png" alt="Bunch-o-Taylors" />
    </div>

    <form id="signin-form" novalidate>
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          autocomplete="email"
          placeholder="you@example.com"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          autocomplete="current-password"
          placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;"
          required
        />
      </div>

      <button type="submit" class="btn-signin" id="submit-btn">Sign In</button>

      <div class="error-msg" id="error-msg" role="alert"></div>
    </form>
  </div>

  <!-- Cognito SDK -->
  <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6/dist/amazon-cognito-identity.min.js"></script>

  <!-- App scripts -->
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>

  <script>
    (function () {
      var form = document.getElementById('signin-form');
      var submitBtn = document.getElementById('submit-btn');
      var errorMsg = document.getElementById('error-msg');

      function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.classList.add('visible');
      }

      function hideError() {
        errorMsg.textContent = '';
        errorMsg.classList.remove('visible');
      }

      function setLoading(loading) {
        if (loading) {
          submitBtn.disabled = true;
          submitBtn.innerHTML = '<span class="spinner"></span> Signing in&hellip;';
        } else {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Sign In';
        }
      }

      // If already signed in, redirect
      Auth.restoreSession().then(function (ok) {
        if (ok) {
          var params = new URLSearchParams(window.location.search);
          var ref = params.get('ref') || (window._config.basePath || '') + '/index.html?nav=memories';
          window.location.href = ref;
        }
      }).catch(function () { /* not signed in, show form */ });

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        hideError();

        var email = document.getElementById('email').value.trim();
        var password = document.getElementById('password').value;

        if (!email || !password) {
          showError('Please enter your email and password.');
          return;
        }

        setLoading(true);

        Auth.signIn(email, password).then(function () {
          var params = new URLSearchParams(window.location.search);
          var ref = params.get('ref') || (window._config.basePath || '') + '/index.html';
          window.location.href = ref;
        }).catch(function (err) {
          setLoading(false);
          var msg = (err && err.message) ? err.message : 'Sign-in failed. Please try again.';
          showError(msg);
        });
      });
    })();
  </script>

</body>
</html>
