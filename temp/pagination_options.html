<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagination Options</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { background: #f0f0f0; font-family: Arial, Helvetica, sans-serif; }
    h5 { margin: 2rem 1rem 0.5rem; color: #555; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .footer-row { height: 75px; }
    .preview { margin-bottom: 0.5rem; }

    /* ── Option 1: Bold white text, no underline, large ── */
    .opt1-prev { background: #b2ebf2; }
    .opt1-mid  { background: #1e88e5; }
    .opt1-next { background: #26c6da; }
    .opt1-prev a, .opt1-next a {
      display: flex; align-items: center; justify-content: center;
      height: 75px;
      font-size: 1.1rem; font-weight: 700;
      color: #fff; text-decoration: none; letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .opt1-prev a:hover, .opt1-next a:hover { color: rgba(255,255,255,0.75); }

    /* ── Option 2: Pill buttons floating in the footer ── */
    .opt2-prev { background: #b2ebf2; }
    .opt2-mid  { background: #1e88e5; }
    .opt2-next { background: #26c6da; }
    .opt2-prev, .opt2-next {
      display: flex; align-items: center; justify-content: center;
    }
    .opt2-prev a, .opt2-next a {
      display: inline-block;
      padding: 0.45rem 1.5rem;
      border-radius: 50px;
      font-size: 0.95rem; font-weight: 600;
      background: rgba(255,255,255,0.25);
      color: #fff; text-decoration: none;
      border: 2px solid rgba(255,255,255,0.6);
      transition: background 0.15s;
    }
    .opt2-prev a:hover, .opt2-next a:hover {
      background: rgba(255,255,255,0.45);
      color: #fff;
    }

    /* ── Option 3: Arrow-only, very minimal ── */
    .opt3-prev { background: #b2ebf2; }
    .opt3-mid  { background: #1e88e5; }
    .opt3-next { background: #26c6da; }
    .opt3-prev, .opt3-next {
      display: flex; align-items: center; justify-content: center;
    }
    .opt3-prev a, .opt3-next a {
      display: flex; align-items: center; justify-content: center;
      width: 48px; height: 48px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      color: #fff; text-decoration: none;
      font-size: 1.6rem; line-height: 1;
      border: 2px solid rgba(255,255,255,0.5);
      transition: background 0.15s;
    }
    .opt3-prev a:hover, .opt3-next a:hover {
      background: rgba(255,255,255,0.5);
    }

    /* ── Option 4: Underline accent, no border, clean ── */
    .opt4-prev { background: #b2ebf2; }
    .opt4-mid  { background: #1e88e5; }
    .opt4-next { background: #26c6da; }
    .opt4-prev, .opt4-next {
      display: flex; align-items: center; justify-content: center;
    }
    .opt4-prev a, .opt4-next a {
      display: inline-block;
      color: #fff; text-decoration: none;
      font-size: 1rem; font-weight: 600;
      padding-bottom: 3px;
      border-bottom: 3px solid rgba(255,255,255,0.7);
      transition: border-color 0.15s;
    }
    .opt4-prev a:hover, .opt4-next a:hover {
      border-color: #fff;
    }
  </style>
</head>
<body>

<h5>Current (baseline)</h5>
<div class="preview container-fluid">
  <div class="row footer-row">
    <div class="col bg-info-subtle text-center align-middle fs-3 pt-2">
      <a href="#" class="text-info page-link">&laquo; Previous</a>
    </div>
    <div class="col bg-primary">&nbsp;</div>
    <div class="col bg-info text-center align-middle fs-3 pt-2">
      <a href="#" class="text-info-emphasis page-link">Next &raquo;</a>
    </div>
  </div>
</div>

<h5>Option 1 — Bold white uppercase</h5>
<div class="preview container-fluid">
  <div class="row footer-row">
    <div class="col opt1-prev"><a href="#">&laquo; Previous</a></div>
    <div class="col opt1-mid"></div>
    <div class="col opt1-next"><a href="#">Next &raquo;</a></div>
  </div>
</div>

<h5>Option 2 — Pill buttons</h5>
<div class="preview container-fluid">
  <div class="row footer-row">
    <div class="col opt2-prev"><a href="#">&laquo; Previous</a></div>
    <div class="col opt2-mid"></div>
    <div class="col opt2-next"><a href="#">Next &raquo;</a></div>
  </div>
</div>

<h5>Option 3 — Arrow circles only</h5>
<div class="preview container-fluid">
  <div class="row footer-row">
    <div class="col opt3-prev"><a href="#">&#8592;</a></div>
    <div class="col opt3-mid"></div>
    <div class="col opt3-next"><a href="#">&#8594;</a></div>
  </div>
</div>

<h5>Option 4 — Underline accent</h5>
<div class="preview container-fluid">
  <div class="row footer-row">
    <div class="col opt4-prev"><a href="#">&laquo; Previous</a></div>
    <div class="col opt4-mid"></div>
    <div class="col opt4-next"><a href="#">Next &raquo;</a></div>
  </div>
</div>

</body>
</html>
