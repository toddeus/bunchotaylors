<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post - Bunch-o-Taylors</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6/dist/amazon-cognito-identity.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
  <script src="https://unpkg.com/exifr@7/dist/lite.umd.cjs"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .type-btn {
      flex: 1; padding: 24px 16px; font-size: 1.1rem; font-weight: 600;
      border: 2px solid #d0daea; border-radius: 12px; background: #fff;
      color: #1e3a5f; cursor: pointer; transition: border-color .15s, background .15s;
    }
    .type-btn:hover, .type-btn.active { border-color: #3f67c0; background: #eef3ff; color: #3f67c0; }
    .type-label { display: block; font-size: .75rem; font-weight: 400; color: #8898aa; margin-top: 4px; }
    .btn-remove-item {
      position: absolute; top: 4px; right: 4px;
      width: 22px; height: 22px; border-radius: 50%;
      background: rgba(220,53,69,.85); color: #fff;
      border: none; font-size: 14px; line-height: 1;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
  </style>
</head>
<body>
  <header class="sticky-top bg-body">
    <nav class="navbar d-flex justify-content-center">
      <a href="menu.html">
        <img src="banner.png" class="img-fluid mx-auto" alt="Bunch-o-Taylors">
      </a>
    </nav>
  </header>
  <aside id="spinner" class="position-fixed bg-body">
    <div class="text-center">
      <div class="spinner-border" role="status" style="width:3rem;height:3rem;"></div>
      <p class="fw-medium fs-3" id="spinnerMessage">Loading...</p>
    </div>
  </aside>
  <main>
    <div class="container" style="max-width:720px;">
      <div id="error-area"></div>

      <!-- Add mode: type picker -->
      <div id="type-picker" class="mt-4" style="display:none">        
        <div class="d-flex gap-3">
          <button type="button" class="type-btn" id="btn-type-photo">
            Photo
          </button>
          <button type="button" class="type-btn" id="btn-type-video">
            Video
          </button>
        </div>
      </div>

      <!-- Main form -->
      <form id="editForm" class="mt-3 mb-5" style="display:none">

        <div class="mb-3">
          <label for="f-title" class="form-label fw-semibold">Title</label>
          <input type="text" id="f-title" class="form-control" required />
        </div>

        <div class="mb-3">
          <label for="f-postdate" class="form-label fw-semibold">Date</label>
          <input type="date" id="f-postdate" class="form-control" required />
        </div>

        <div class="row g-2 mb-3">
          <div class="col">
            <label for="f-tag1" class="form-label fw-semibold">Tag 1</label>
            <input type="text" id="f-tag1" class="form-control" />
          </div>
          <div class="col">
            <label for="f-tag2" class="form-label fw-semibold">Tag 2</label>
            <input type="text" id="f-tag2" class="form-control" />
          </div>
          <div class="col">
            <label for="f-tag3" class="form-label fw-semibold">Tag 3</label>
            <input type="text" id="f-tag3" class="form-control" />
          </div>
        </div>

        <div class="mb-3">
          <label for="f-dir" class="form-label fw-semibold">Directory</label>
          <input type="text" id="f-dir" class="form-control" />
        </div>

        <div class="row g-2 mb-3" id="thumb-video-row">
          <div class="col">
            <label for="f-thumb" class="form-label fw-semibold">Thumbnail</label>
            <input type="text" id="f-thumb" class="form-control" />
          </div>
          <div class="col">
            <label for="f-video" class="form-label fw-semibold">Video</label>
            <input type="text" id="f-video" class="form-control" />
          </div>
        </div>

        <div class="row g-2 mb-2">
          <div class="col">
            <label for="f-lat" class="form-label fw-semibold">Latitude</label>
            <input type="number" step="any" id="f-lat" class="form-control" placeholder="e.g. 40.7128" />
          </div>
          <div class="col">
            <label for="f-lon" class="form-label fw-semibold">Longitude</label>
            <input type="number" step="any" id="f-lon" class="form-control" placeholder="e.g. -74.0060" />
          </div>
          <div class="col-auto d-flex align-items-end">
            <button type="button" id="btn-pick-map" class="btn btn-outline-secondary">Pick on Map</button>
          </div>
        </div>
        <div id="location-map" style="height:260px;display:none;border-radius:8px;" class="mb-3"></div>

        <!-- Edit mode: existing photo grid -->
        <div class="mb-4" id="items-section" style="display:none">
          <label class="form-label fw-semibold">Photos</label>
          <div class="row row-cols-2 row-cols-md-4 g-2" id="items-grid"></div>
        </div>

        <!-- Add mode: file uploads -->
        <div class="mb-4" id="upload-section" style="display:none">
          <!-- Photo upload -->
          <div id="photo-upload-section">
            <label class="form-label fw-semibold">Photos</label>
            <input type="file" id="f-photos" class="form-control" multiple
              accept="image/*,.heic,.heif" />
            <div class="row row-cols-2 row-cols-md-4 g-2 mt-2" id="photo-preview"></div>
          </div>
          <!-- Video upload -->
          <div id="video-upload-section" style="display:none">
            <div class="mb-3">
              <label class="form-label fw-semibold">
                Thumbnail <span class="text-danger">*</span>
              </label>
              <input type="file" id="f-thumb-file" class="form-control"
                accept="image/jpeg,image/png,.jpg,.jpeg,.png" />
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Video</label>
              <input type="file" id="f-video-file" class="form-control"
                accept="video/mp4,video/quicktime,.mp4,.mov" />
            </div>
          </div>
        </div>

        <div class="d-flex gap-2 justify-content-end pb-4">
          <a href="#" id="btn-cancel" class="btn btn-outline-secondary px-4">Cancel</a>
          <button type="submit" id="btn-save" class="btn btn-primary px-4">Save</button>
        </div>

      </form>
    </div>
  </main>

<script>
// ── Constants ────────────────────────────────────────────
const MAX_W = 1600, MAX_H = 1400;

// ── State ────────────────────────────────────────────────
let addType = null;       // 'photo' | 'video'  (add mode only)
let thumbFileExt = '.png';
let videoFileExt = '.mp4';
let leafletMap = null;
let leafletMarker = null;

// ── Helpers ──────────────────────────────────────────────
function escAttr(str) {
  return String(str).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function nullTag(val) {
  if (!val || val === 'NULL') return '';
  return val;
}

function sanitizeForPath(str) {
  return str.trim().replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_]/g, '');
}

function todayIso() {
  return new Date().toISOString().substring(0, 10);
}

function showError(msg) {
  $('#error-area').html('<div class="alert alert-danger mt-3" role="alert">' + msg + '</div>');
}

function clearError() {
  $('#error-area').empty();
}

function setSpinner(msg) {
  $('#spinnerMessage').text(msg || 'Loading...');
  $('#spinner').removeClass('d-none');
}

function hideSpinner() {
  $('#spinner').addClass('d-none');
}

// ── Map ───────────────────────────────────────────────────
function showMap(lat, lon) {
  $('#location-map').show();
  if (!leafletMap) {
    leafletMap = L.map('location-map').setView([lat, lon], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors',
      maxZoom: 19,
    }).addTo(leafletMap);
    leafletMarker = L.marker([lat, lon], { draggable: true }).addTo(leafletMap);
    leafletMarker.on('dragend', function () {
      const pos = leafletMarker.getLatLng();
      $('#f-lat').val(pos.lat.toFixed(6));
      $('#f-lon').val(pos.lng.toFixed(6));
    });
    leafletMap.on('click', function (e) {
      leafletMarker.setLatLng(e.latlng);
      $('#f-lat').val(e.latlng.lat.toFixed(6));
      $('#f-lon').val(e.latlng.lng.toFixed(6));
    });
  } else {
    leafletMap.setView([lat, lon], leafletMap.getZoom());
    leafletMarker.setLatLng([lat, lon]);
  }
  setTimeout(function () { leafletMap.invalidateSize(); }, 50);
}

async function detectGpsFromFiles(files) {
  for (const file of files) {
    try {
      const tags = await exifr.parse(file, { gps: true });
      if (tags && tags.latitude != null && tags.longitude != null) {
        $('#f-lat').val(tags.latitude.toFixed(6));
        $('#f-lon').val(tags.longitude.toFixed(6));
        showMap(tags.latitude, tags.longitude);
        break;
      }
    } catch (e) {
      console.error('GPS detection failed:', e);
    }
  }
}

// ── Field auto-derivation (add mode) ─────────────────────
function deriveAddFields() {
  if (!addType) return;
  const title = $('#f-title').val().trim();
  const date  = $('#f-postdate').val();
  if (!title || !date) return;

  const safe = sanitizeForPath(title);
  const year = date.substring(0, 4);
  const MM   = date.substring(5, 7);
  const dd   = date.substring(8, 10);

  if (addType === 'photo') {
    $('#f-dir').val('photo/' + year + '/' + MM + '_' + safe);
  } else {
    const base = year + '_' + MM + '_' + dd + '_' + safe;
    $('#f-dir').val('video/' + year);
    $('#f-thumb').val(base + thumbFileExt);
    $('#f-video').val('video/' + year + '/' + base + videoFileExt);
  }
}

// ── Image processing (add mode, photos) ──────────────────
function loadImage(blob) {
  return new Promise(function (resolve, reject) {
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = function () { URL.revokeObjectURL(url); resolve(img); };
    img.onerror = function () { URL.revokeObjectURL(url); reject(new Error('Failed to load image')); };
    img.src = url;
  });
}

function rotateCanvas(img, orientation) {
  const sw = img.naturalWidth, sh = img.naturalHeight;
  const canvas = document.createElement('canvas');
  const ctx    = canvas.getContext('2d');

  if (orientation === 6) {        // 90° CW
    canvas.width = sh; canvas.height = sw;
    ctx.translate(sh, 0);
    ctx.rotate(Math.PI / 2);
  } else if (orientation === 3) { // 180°
    canvas.width = sw; canvas.height = sh;
    ctx.translate(sw, sh);
    ctx.rotate(Math.PI);
  } else if (orientation === 8) { // 90° CCW
    canvas.width = sh; canvas.height = sw;
    ctx.translate(0, sw);
    ctx.rotate(-Math.PI / 2);
  } else {
    canvas.width = sw; canvas.height = sh;
  }

  ctx.drawImage(img, 0, 0);
  return canvas;
}

function resizeCanvas(src, maxW, maxH) {
  const sw = src.width, sh = src.height;
  if (sw <= maxW && sh <= maxH) return src;

  let ow, oh;
  if (sh >= sw) {                    // portrait: fit to height
    oh = maxH;
    ow = Math.round(sw * (maxH / sh));
  } else {                           // landscape: fit to width
    ow = maxW;
    oh = Math.round(sh * (maxW / sw));
  }

  const canvas = document.createElement('canvas');
  canvas.width  = ow;
  canvas.height = oh;
  canvas.getContext('2d').drawImage(src, 0, 0, ow, oh);
  return canvas;
}

function canvasToBlob(canvas) {
  return new Promise(function (resolve) {
    canvas.toBlob(resolve, 'image/jpeg', 0.92);
  });
}

async function processPhoto(file) {
  let blob     = file;
  let filename = file.name;
  const isHeic = /\.(heic|heif)$/i.test(filename) || /heic|heif/i.test(file.type);

  // HEIC → JPEG
  if (isHeic) {
    let converted = await heic2any({ blob: file, toType: 'image/jpeg', quality: 0.92 });
    if (Array.isArray(converted)) converted = converted[0];
    blob     = converted;
    filename = filename.replace(/\.(heic|heif)$/i, '.jpg');
  }

  // GIF: skip canvas processing to preserve animation
  if (/\.gif$/i.test(filename) || file.type === 'image/gif') {
    return { blob, filename, contentType: 'image/gif' };
  }

  // Read EXIF orientation
  let orientation = 1;
  try {
    const tags = await exifr.parse(blob, ['Orientation']);
    if (tags && tags.Orientation) orientation = tags.Orientation;
  } catch (_) {}

  const img      = await loadImage(blob);
  const rotated  = rotateCanvas(img, orientation);
  const resized  = resizeCanvas(rotated, MAX_W, MAX_H);
  const outBlob  = await canvasToBlob(resized);

  return { blob: outBlob, filename, contentType: 'image/jpeg' };
}

// ── Add mode init ─────────────────────────────────────────
function initAddMode() {
  $('#btn-cancel').attr('href', 'menu.html');
  $('#type-picker').show();
  hideSpinner();

  $('#btn-type-photo').on('click', function () { selectAddType('photo'); });
  $('#btn-type-video').on('click', function () { selectAddType('video'); });
}

function selectAddType(type) {
  addType = type;
  $('#type-picker').hide();

  // Default fields
  $('#f-postdate').val(todayIso());
  if (type === 'video') {
    $('#f-tag1').val('video');
    $('#thumb-video-row').show();
    $('#photo-upload-section').hide();
    $('#video-upload-section').show();
  } else {
    $('#thumb-video-row').hide();
    $('#photo-upload-section').show();
    $('#video-upload-section').hide();
  }

  $('#upload-section').show();
  $('#editForm').show();

  // Wire derivation
  $('#f-title, #f-postdate').on('input change', deriveAddFields);

  // Update video/thumb extensions when files chosen
  $('#f-thumb-file').on('change', function () {
    const file = this.files[0];
    if (!file) return;
    const ext = '.' + file.name.split('.').pop().toLowerCase();
    thumbFileExt = ext;
    deriveAddFields();
  });
  $('#f-video-file').on('change', function () {
    const file = this.files[0];
    if (!file) return;
    const raw = file.name.split('.').pop().toLowerCase();
    videoFileExt = raw === 'mov' ? '.mp4' : '.' + raw;
    deriveAddFields();
  });

  // Photo preview
  $('#f-photos').on('change', function () {
    const files = Array.from(this.files);
    const $prev = $('#photo-preview').empty();
    files.forEach(function (file) {
      const url = URL.createObjectURL(file);
      $prev.append(
        '<div class="col">' +
          '<img src="' + escAttr(url) + '" class="img-fluid rounded" ' +
            'style="aspect-ratio:1;object-fit:cover" alt="">' +
          '<div class="text-muted small mt-1 text-truncate">' + escAttr(file.name) + '</div>' +
        '</div>'
      );
    });
    detectGpsFromFiles(files);

    if (files.length > 0) {
      try {
        exifr.parse(files[0], { exif: true }).then(function (tags) {
          const raw = tags && (tags.DateTimeOriginal || tags.DateTime || tags.CreateDate);
          if (!raw) { console.warn('No date tag found in EXIF'); return; }
          const d = raw instanceof Date ? raw
            : new Date(String(raw).replace(/^(\d{4}):(\d{2}):(\d{2})/, '$1-$2-$3'));
          if (isNaN(d.getTime())) { console.warn('Could not parse EXIF date:', raw); return; }
          const iso = d.getFullYear() + '-' +
            String(d.getMonth() + 1).padStart(2, '0') + '-' +
            String(d.getDate()).padStart(2, '0');
          $('#f-postdate').val(iso);
          deriveAddFields();
        }).catch(function (e) { console.error('Date detection failed:', e); });
      } catch (e) { console.error('Date detection failed:', e); }
    }
  });

  // Submit
  $('#editForm').on('submit', function (e) {
    e.preventDefault();
    doAdd();
  });
}

async function doAdd() {
  clearError();

  const title   = $('#f-title').val().trim();
  const postdate = $('#f-postdate').val();
  const dir     = $('#f-dir').val().trim();

  if (!title || !postdate || !dir) {
    showError('Title, Date, and Directory are required.');
    return;
  }

  // Per-type validation
  if (addType === 'video') {
    const thumbFile = $('#f-thumb-file')[0].files[0];
    if (!thumbFile) { showError('Thumbnail is required for video posts.'); return; }
  } else {
    const photoFiles = $('#f-photos')[0].files;
    if (!photoFiles.length) { showError('Select at least one photo.'); return; }
  }

  setSpinner('Processing...');
  $('#btn-save').prop('disabled', true);

  try {
    const filesToUpload = [];  // { key, blob, contentType }
    const itemFilenames = [];  // photo filenames for the items array

    if (addType === 'photo') {
      const photoFiles = Array.from($('#f-photos')[0].files);
      setSpinner('Processing ' + photoFiles.length + ' photo(s)...');
      for (const file of photoFiles) {
        const { blob, filename, contentType } = await processPhoto(file);
        filesToUpload.push({ key: dir + '/' + filename, blob, contentType });
        itemFilenames.push(filename);
      }
    } else {
      const thumbFile  = $('#f-thumb-file')[0].files[0];
      const videoFile  = $('#f-video-file')[0].files[0];
      const thumbName  = $('#f-thumb').val().trim();
      const videoPath  = $('#f-video').val().trim();
      filesToUpload.push({ key: dir + '/' + thumbName, blob: thumbFile, contentType: thumbFile.type });
      if (videoFile && videoPath) {
        const isMov = videoFile.name.split('.').pop().toLowerCase() === 'mov';
        filesToUpload.push({ key: videoPath, blob: videoFile, contentType: isMov ? 'video/mp4' : videoFile.type });
      }
    }

    // Get presigned URLs
    setSpinner('Preparing upload...');
    const presignResult = await Auth.apiFetch('bot/presign', {
      method: 'POST',
      body: JSON.stringify({
        files: filesToUpload.map(function (f) { return { key: f.key, contentType: f.contentType }; }),
      }),
    });

    // Upload to S3
    setSpinner('Uploading to S3...');
    for (let i = 0; i < filesToUpload.length; i++) {
      const { blob, contentType } = filesToUpload[i];
      const { url } = presignResult.urls[i];
      const res = await fetch(url, {
        method: 'PUT',
        body: blob,
        headers: { 'Content-Type': contentType },
      });
      if (!res.ok) throw new Error('S3 upload failed for ' + filesToUpload[i].key);
    }

    // Build location
    const lat = $('#f-lat').val();
    const lon = $('#f-lon').val();
    const location = (lat !== '' || lon !== '') ? {
      lat: lat !== '' ? parseFloat(lat) : null,
      lon: lon !== '' ? parseFloat(lon) : null,
    } : null;

    // Create post
    setSpinner('Saving post...');
    const result = await Auth.apiFetch('bot/posts', {
      method: 'POST',
      body: JSON.stringify({
        title,
        postdate,
        dir,
        tag1: $('#f-tag1').val() || null,
        tag2: $('#f-tag2').val() || null,
        tag3: $('#f-tag3').val() || null,
        thumb: addType === 'video' ? $('#f-thumb').val() || null : null,
        video: addType === 'video' ? $('#f-video').val() || null : null,
        items: itemFilenames,
        location,
      }),
    });

    window.location.href = 'index.html?post=' + encodeURIComponent(result.posts[0].id);

  } catch (err) {
    hideSpinner();
    $('#btn-save').prop('disabled', false);
    showError('Failed: ' + err.message);
    console.error(err);
  }
}

// ── Edit mode init ────────────────────────────────────────
function initEditMode(postId) {
  var currentItems = [];
  var postDir = '';

  $('#btn-cancel').attr('href', 'index.html?post=' + encodeURIComponent(postId));
  $('#thumb-video-row').show();
  $('#items-section').show();

  Auth.apiFetch('bot/posts/' + postId).then(function (json) {
    var post = json.posts[0];
    if (!post) { showError('Post not found.'); hideSpinner(); return; }

    postDir      = post.dir || '';
    currentItems = post.items ? post.items.slice() : [];

    $('#f-title').val(post.title || '');
    $('#f-postdate').val(post.postdate || '');
    $('#f-tag1').val(nullTag(post.tag1));
    $('#f-tag2').val(nullTag(post.tag2));
    $('#f-tag3').val(nullTag(post.tag3));
    $('#f-dir').val(post.dir || '');
    $('#f-thumb').val(post.thumb || '');
    $('#f-video').val(post.video || '');
    if (post.location) {
      $('#f-lat').val(post.location.lat != null ? post.location.lat : '');
      $('#f-lon').val(post.location.lon != null ? post.location.lon : '');
    }

    renderItems();
    $('#editForm').show();
    hideSpinner();

    if (post.location && post.location.lat != null && post.location.lon != null) {
      showMap(post.location.lat, post.location.lon);
    }
  }).catch(function (err) {
    showError('Failed to load post: ' + err.message);
    hideSpinner();
  });

  function renderItems() {
    var $grid = $('#items-grid').empty();
    if (!currentItems.length) {
      $grid.append('<p class="text-muted col-12 mt-1">No photos.</p>');
      return;
    }
    var dir = $('#f-dir').val() || postDir;
    currentItems.forEach(function (item) {
      var url = _config.s3.url + dir + '/' + item;
      $grid.append(
        '<div class="col" data-item="' + escAttr(item) + '">' +
          '<div class="position-relative">' +
            '<img src="' + escAttr(url) + '" class="img-fluid rounded" alt="">' +
            '<button type="button" class="btn-remove-item" data-item="' + escAttr(item) + '">&#x00D7;</button>' +
          '</div>' +
        '</div>'
      );
    });
  }

  $(document).on('click', '.btn-remove-item', function () {
    var item = $(this).data('item');
    currentItems = currentItems.filter(function (i) { return i !== item; });
    $('[data-item="' + item + '"].col').remove();
    if (!currentItems.length) $('#items-grid').append('<p class="text-muted col-12 mt-1">No photos.</p>');
  });

  $('#editForm').on('submit', function (e) {
    e.preventDefault();

    var lat = $('#f-lat').val();
    var lon = $('#f-lon').val();
    var location = null;
    if (lat !== '' || lon !== '') {
      location = {
        lat: lat !== '' ? parseFloat(lat) : null,
        lon: lon !== '' ? parseFloat(lon) : null,
      };
    }

    var data = {
      title:    $('#f-title').val(),
      postdate: $('#f-postdate').val(),
      tag1:     $('#f-tag1').val() || null,
      tag2:     $('#f-tag2').val() || null,
      tag3:     $('#f-tag3').val() || null,
      dir:      $('#f-dir').val(),
      thumb:    $('#f-thumb').val() || null,
      video:    $('#f-video').val() || null,
      items:    currentItems,
      location,
    };

    $('#btn-save').prop('disabled', true).text('Saving...');

    Auth.apiFetch('bot/posts/' + postId, {
      method: 'PUT',
      body: JSON.stringify(data),
    }).then(function () {
      window.location.href = 'index.html?post=' + encodeURIComponent(postId);
    }).catch(function (err) {
      showError('Save failed: ' + err.message);
      $('#btn-save').prop('disabled', false).text('Save');
    });
  });
}

// ── Bootstrap ─────────────────────────────────────────────
$(document).ready(function () {
  $('#btn-pick-map').on('click', function () {
    const lat = parseFloat($('#f-lat').val());
    const lon = parseFloat($('#f-lon').val());
    if (!isNaN(lat) && !isNaN(lon)) {
      showMap(lat, lon);
    } else if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        function (pos) { showMap(pos.coords.latitude, pos.coords.longitude); },
        function ()    { showMap(39.8283, -98.5795); }
      );
    } else {
      showMap(39.8283, -98.5795);
    }
  });

  $('#f-lat, #f-lon').on('change', function () {
    const lat = parseFloat($('#f-lat').val());
    const lon = parseFloat($('#f-lon').val());
    if (!isNaN(lat) && !isNaN(lon) && leafletMap) {
      leafletMarker.setLatLng([lat, lon]);
      leafletMap.setView([lat, lon], leafletMap.getZoom());
    }
  });

  Auth.restoreSession().then(function (valid) {
    if (!valid) {
      window.location.href = 'signin.html?ref=' + encodeURIComponent(window.location.href);
      return;
    }

    var params = new URLSearchParams(window.location.search);
    var postId = params.get('post');

    if (postId) {
      initEditMode(postId);
    } else {
      initAddMode();
    }
  });
});
</script>
</body>
</html>
