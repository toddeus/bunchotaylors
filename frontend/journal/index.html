<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />    
    <meta name="apple-mobile-web-app-capable" content="yes" data-react-helmet="true">
    <meta name="mobile-web-app-capable" content="yes" data-react-helmet="true">
    <link rel="manifest" href="manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1" data-react-helmet="true">
    <title>My Journal</title>
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <script type="text/javascript" src="../js/vendor/jquery-3.2.1.min.js"></script>
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.656.0.min.js"></script>
    <script src="../js/vendor/aws-cognito-sdk.min.js"></script>
    <script src="../js/vendor/amazon-cognito-identity.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/cognito-auth.js"></script>
    <script type="text/javascript" src="journal.js"></script>    
    <link rel="stylesheet" media="all" href="style.css"/>
  </head>
  <body>
    <div class="container-fluid">
      <div class="card p-3 mb-2 mt-2">
        <input type="date" id="selecteddate">
      </div>
      <div class="card p-3">         
        <div id="health">       
        </div> 
      </div>
      <button class="btn btn-outline-dark w-100 mt-2" data-bs-toggle="button" type="submit" id='submit'>Save</button>      
    </div>
    <script>
  	$(document).ready(function() {  	
  		var dateToday = formatDateYMD(new Date());
  		$('#selecteddate').val(dateToday);
  		getJournalRecord(dateToday);
  		
  		$('#selecteddate').change(function(e) {  			
  			getJournalRecord($('#selecteddate').val());
  		});
  		
  		$('#submit').click(function(e) {  			
  			var request = new Object();
  			
			var health = [];
			$('.opt[aria-pressed=true]').each(function() {				
				health.push($(this).text());
			});
			
			var owie = [];
			$('.form-range').each(function() {
				var name = $(this).attr('id');
				var value = $(this).val();
				if (value > 0) {
					owie.push({"id" : name, "value" : value});
				}
			});
			
			request.date = $('#selecteddate').val();
			request.note = $('#note').val();
			request.workhours = $('#workhours').val();
			request.health = health;
			request.owie = owie;
			
			//console.log(JSON.stringify(request));
			save($('#selecteddate').val(),JSON.stringify(request));
		});
  	});
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
  </body>
</html>
