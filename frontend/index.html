<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#5e72e4" />
  <title>Bunch-o-Taylors - it's taylorrific!</title> 
  <link rel="manifest" href="manifest.json" />
  <meta name="mobile-web-app-capable" content="yes">  
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Bunch-o-Taylors" />
  <link rel="apple-touch-icon" href="app-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5/dist/fancybox/fancybox.css" />
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">  
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>  <script src="js/jquery.stayInWebApp.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/masonry-layout@4.2.2/dist/masonry.pkgd.min.js" integrity="sha384-GNFwBvfVxBkLMJpYMOABq3c+d3KnQxudP/mGPkzpZSTYykLBNsZEnG2D9G/X/+7D" crossorigin="anonymous" async></script>
  <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5/dist/fancybox/fancybox.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/imagesloaded@5/imagesloaded.pkgd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6/dist/amazon-cognito-identity.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/bot.js"></script>  
</head>
<body>
  <header class="sticky-top bg-body">
    <nav class="navbar d-flex justify-content-center">
      <a href="menu.html">
        <img src="banner.png" class="img-fluid mx-auto">
      </a>      
    </nav>  
  </header>
  <aside id="spinner" class="position-fixed bg-body">
    <div class="text-center">
      <div class="spinner-border" role="status" style="width: 3rem; height: 3rem;"></div>        
      <p class="fw-medium fs-3" id="loadingMessage">Loading......</p>        
    </div>  
  </aside>  
  <main>     
    <div class="container-fluid">
      <h5 id="nomemories" class="d-none text-center">No memories today; go make some! Here are some random ones in the mean time:</h5>
      <div class="thegrid row row-cols-1 row-cols-md-2 row-cols-xxl-4" style="position: relative;">
      </div>
    </div>      
  </main>  
  <footer class="footer pt-2">    
	<div class="row">
	  <div class="col bg-info-subtle footer-nav-col"><a href="#" id="anchorprevious">&#8592;</a></div>
	  <div class="col bg-primary"></div>
	  <div class="col bg-info footer-nav-col"><a href="#" id="anchornext">&#8594;</a></div>
	</div>    
  </footer>  
<script>
$(document).ready(function() {    
	$.stayInWebApp();
	
	displayLoadingMessage();
	
  	var params = new URLSearchParams(window.location.search);
	var nav = '';
	var tag = '';
	var offset = '';
	var post = '';
	var searchTerm = '';
	var month = '';
	var day = '';
	
	if (params.has('nav'))
		nav = params.get('nav');
	
	if (params.has('tag'))
		tag = params.get('tag');
	
	if (params.has('offset'))
		offset = params.get('offset');
	
	if (params.has('post'))
		post = params.get('post');
	
	if (params.has('search'))
		searchTerm = params.get('search');
	
	if (params.has('month'))
		month = params.get('month');
	
	if (params.has('day'))
		day = params.get('day');
	
	if (searchTerm === '') {
		if (post === '')
			getPosts(nav, tag, offset, month, day);
		else
			getPost(post);    	
	}
	else {
		searchPosts(searchTerm, offset);
	}
		
	var url = new URL(window.location.href);
	if (!url.search) {		
		//index.html random page
		$("#anchorprevious").addClass("d-none");
		$("#anchornext").addClass("d-none");
	}
	else {
    	offset = parseInt(url.searchParams.get("offset") || "0", 10);
    	var step = 10;
    	
    	var nextUrl = new URL(url);
    	nextUrl.searchParams.set("offset", offset + step);
    	var nextPath = (nextUrl.pathname + nextUrl.search).replace(/#$/, "");
    	$("#anchornext").attr("href", nextPath);
    	
    	if (offset > 0) {
    		var prevUrl = new URL(url);
    		prevUrl.searchParams.set("offset", offset > step ? offset - step : 0);
    		var prevPath = (prevUrl.pathname + prevUrl.search).replace(/#$/, "");
    		$("#anchorprevious").attr("href", prevPath);		
    	}
    	else {
    		$("#anchorprevious").addClass("d-none");	
    	}
	}
});
</script>
</body>
</html>
