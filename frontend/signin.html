<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#5e72e4" />
  <title>Bunch-o-Taylors - it's taylorrific!</title> 
  <link rel="manifest" href="manifest.json" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Bunch-o-Taylors" />
  <link rel="apple-touch-icon" href="app-icon.png" />
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">  
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>  <script src="js/jquery.stayInWebApp.min.js"></script>  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6/dist/amazon-cognito-identity.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</head>
<body>
<body>

<nav class="navbar bg-body">
  <img src="banner.png" class="img-fluid mx-auto">        
</nav>

<div class="container-sm">
  <form id="signinForm">
    <input type="email" id="username" class="form-control form-control-lg mb-3" placeholder="email" required>
    <input type="password" id="password" class="form-control form-control-lg mb-3" placeholder="password" pattern=".*" required>    
    <button type="submit" class="btn btn-secondary btn-lg btn-block">Sign In</button>    
  </form>
</div>

<script>
$(document).ready(function() {
	Auth.restoreSession().then(function (ok) {
      if (ok) {
        var params = new URLSearchParams(window.location.search);
        var ref = params.get('ref') || (window._config.basePath || '') + '/index.html?nav=memories';
        window.location.href = ref;
      }
    }).catch(function () { /* not signed in, show form */ });
	
    $('#signinForm').submit(function(event) {
        event.preventDefault(); 

        let username = $('#username').val();
        let password = $('#password').val();
        
        Auth.signIn(username, password).then(function () {
          var params = new URLSearchParams(window.location.search);
          var ref = params.get('ref') || (window._config.basePath || '') + '/index.html?nav=memories';
          window.location.href = ref;
        }).catch(function (err) {
          setLoading(false);
          var msg = (err && err.message) ? err.message : 'Sign-in failed. Please try again.';
        });
    });
});
</script>
</body>
</html>
